<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Development</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    overflow:hidden;
}

.container{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:450px;
    text-align:center;
    color:white;
    animation:popup 0.6s ease;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
    margin-bottom:15px;
    animation:pulse 2s infinite;
}

p{
    line-height:1.6;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    background:#22c55e;
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

@keyframes popup{
    from{
        opacity:0;
        transform:scale(0.7);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>⚠️ Under Development</h1>

    <p>
        This project is currently under development.<br><br>
        You may experience crashes, bugs, missing features,
        or unknown errors while using it.
    </p>

    <button onclick="continueToApp()">OK, Continue</button>
</div>

<script>
function continueToApp(){
    window.location.href = "play.html";
}
</script>

</body>
</html>
