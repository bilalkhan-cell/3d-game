<!DOCTYPE html>
<html>
  <head>
    <title>3D Maze Escape</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="js/main.js"></script>
  </head>
  <body>
    <a-scene maze-builder>
      <a-sky color="#87CEEB"></a-sky> 
      <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#2E8B57"></a-plane>

      <a-entity id="player" camera look-controls wasd-controls="acceleration: 100" position="3 1.6 3" player-collider>
        
        <a-cylinder id="player-body" position="0 -1.6 0" height="2" radius="0.4" color="#FF6B6B" visible="false"></a-cylinder>
        
      </a-entity>
    </a-scene>
  </body>
</html>
